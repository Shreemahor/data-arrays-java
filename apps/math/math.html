<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Operations Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="math.css">
</head>
<body>
    <div class="container">
        <h1 id="game-title"></h1>

        <div class="content-wrapper">
            <div class="table-container">
                <h2>Edit Array</h2>
                <table id="array-table">
                    <tbody>
                        <!-- Table rows will be generated by JavaScript -->
                    </tbody>
                </table>
            </div>

            <div class="operations-container">
                <h2>Operations</h2>
                <button class="operation-btn" data-operation="mean">Mean</button>
                <button class="operation-btn" data-operation="median">Median</button>
                <button class="operation-btn" data-operation="mode">Mode</button>
                <button class="operation-btn" data-operation="stdDev">Standard Deviation</button>
                <button class="operation-btn" data-operation="max">Max</button>
                <button class="operation-btn" data-operation="min">Min</button>
                <button class="operation-btn" data-operation="uniqueCount">Unique Elements</button>

                <div id="results-display" class="results-display">
                    <!-- Results will appear here -->
                </div>
            </div>
        </div>

        <div class="all-button-container">
            <button id="all-operations-btn" class="all-btn">All Operations</button>
        </div>

        <div id="summary-display" class="summary-display">
            <!-- Grand summary will appear here -->
        </div>

        <a href="../../index.html" class="back-home-btn">Back Home</a>
    </div>

    <script src="math.js"></script>
</body>
</html>
